apt_repositories:
  add:
    - "deb [signed-by=/etc/apt/keyrings/unit193-encryption-noble.gpg] http://ppa.launchpad.net/unit193/encryption/ubuntu noble main"
  remove: []

packages:
  install:
    - ansible
    - git
    - git-credential-oauth
    - gnupg2
    - htop
    - keepassxc
    - scdaemon
    - veracrypt
    - vim
    - vim-pathogen
    - yubikey-manager
  remove: []

alternatives_list:
  - name: editor
    link: /usr/bin/editor
    path: /usr/bin/vim.basic
    state: selected

bios_settings:
  - name: "SleepState"
    value: "Linux"
  - name: "SecureBoot"
    value: "Enable"
